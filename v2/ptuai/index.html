<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>평택대학교 총장 Executive Dashboard</title>
<style>
  :root{
    --plane:#EEF1F5; --surface:#FFFFFF; --surface-2:#F6F8FB; --surface-3:#EFF3F8;
    --ink:#151C28; --ink-2:#3A465A; --muted:#697688; --faint:#95A0B0;
    --line:#E4E8EF; --line-2:#D2D9E3;
    --accent:#009B64; --accent-2:#12B37A; --accent-soft:#E6F4EE;
    --nav:#FFFFFF; --nav-ink:#3A465A; --nav-gold:#B58A2E;
    --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
    --good-tint:#E6F5E6; --warn-tint:#FBF1D8; --serious-tint:#FBE9E1; --crit-tint:#FAE3E3;
    --good-ink:#0a7a0a; --warn-ink:#8a6410; --serious-ink:#b5502b; --crit-ink:#a82a2a;
    --s-plan:#009B64; --s-fund:#eb6834; --s-3:#1baf7a;
    --delta-up:#0a7a0a; --delta-down:#c02626;
    --grid:#EAEDF2; --axis:#C7CFDA;
    --shadow-sm:0 1px 2px rgba(21,28,40,.05);
    --shadow:0 1px 2px rgba(21,28,40,.04),0 6px 20px -10px rgba(21,28,40,.16);
    --shadow-lg:0 14px 44px -12px rgba(21,28,40,.3);
    --sans:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",system-ui,"Malgun Gothic",sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --r:14px;
  }
  :root[data-theme="dark"]{
    --plane:#0C1017; --surface:#161C26; --surface-2:#1B222E; --surface-3:#202836;
    --ink:#E9EDF3; --ink-2:#BFC9D6; --muted:#8593A4; --faint:#5E6B7C;
    --line:#252E3A; --line-2:#323C4A;
    --accent:#25C088; --accent-2:#45D2A0; --accent-soft:#0E2A20;
    --nav:#FFFFFF; --nav-ink:#3A465A; --nav-gold:#B58A2E;
    --good-tint:#12241255; --warn-tint:#2A210F66; --serious-tint:#2C170F66; --crit-tint:#2A131366;
    --good-ink:#4Fb44f; --warn-ink:#e0a33c; --serious-ink:#ef9670; --crit-ink:#e66767;
    --s-plan:#25C088; --s-fund:#d95926; --s-3:#199e70;
    --delta-up:#42b342; --delta-down:#e86a6a;
    --grid:#232B37; --axis:#374252;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px -12px rgba(0,0,0,.55);
    --shadow-lg:0 16px 48px -14px rgba(0,0,0,.7);
  }
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --plane:#0C1017; --surface:#161C26; --surface-2:#1B222E; --surface-3:#202836;
    --ink:#E9EDF3; --ink-2:#BFC9D6; --muted:#8593A4; --faint:#5E6B7C;
    --line:#252E3A; --line-2:#323C4A;
    --accent:#25C088; --accent-2:#45D2A0; --accent-soft:#0E2A20;
    --nav:#FFFFFF; --nav-ink:#3A465A; --nav-gold:#B58A2E;
    --good-tint:#12241255; --warn-tint:#2A210F66; --serious-tint:#2C170F66; --crit-tint:#2A131366;
    --good-ink:#4Fb44f; --warn-ink:#e0a33c; --serious-ink:#ef9670; --crit-ink:#e66767;
    --s-plan:#25C088; --s-fund:#d95926; --s-3:#199e70;
    --delta-up:#42b342; --delta-down:#e86a6a;
    --grid:#232B37; --axis:#374252;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px -12px rgba(0,0,0,.55);
    --shadow-lg:0 16px 48px -14px rgba(0,0,0,.7);
  }}

  *{box-sizing:border-box}
  body{margin:0;background:var(--plane);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;letter-spacing:-.004em}
  a{color:inherit;text-decoration:none}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:var(--sans)}

  /* topbar */
  .topbar{background:var(--nav);color:var(--nav-ink);position:sticky;top:0;z-index:40;border-bottom:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .topbar-in{max-width:1480px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:0 clamp(12px,2vw,24px);height:56px}
  .brand{display:flex;align-items:center;gap:10px;flex:none;cursor:pointer}
  .brand .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#12B37A,#00875A);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;box-shadow:var(--shadow-sm)}
  .brand .blogo{display:flex;flex-direction:column;align-items:flex-start;gap:3px;flex:none}
  .brand .blogo img{height:30px;display:block}
  .brand .tagline{font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);font-weight:700;font-family:var(--mono);padding-left:3px}
  .brand span{color:var(--nav-ink);font-size:11px;opacity:.7;font-family:var(--mono)}
  nav.mainnav{display:flex;gap:1px;margin-left:6px;overflow-x:auto;scrollbar-width:none}
  nav.mainnav::-webkit-scrollbar{display:none}
  nav.mainnav a{color:var(--nav-ink);font-size:13px;padding:7px 10px;border-radius:8px;white-space:nowrap;
    font-weight:500;opacity:.8;transition:.15s;display:flex;align-items:center;gap:5px}
  nav.mainnav a:hover{background:#EEF2F6;opacity:1}
  nav.mainnav a.on{background:#009B64;color:#fff;opacity:1;font-weight:650}
  nav.mainnav a .lk{font-size:10px;opacity:.6}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex:none}
  .pill-btn{display:flex;align-items:center;gap:6px;background:#F2F5F9;color:#3A465A;
    border:1px solid #E1E6EE;border-radius:9px;padding:6px 9px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
  .pill-btn:hover{background:#E6EBF2;color:#151C28}
  .pill-btn .role-dot{width:7px;height:7px;border-radius:50%;background:var(--nav-gold)}
  .pill-btn.date{font-family:var(--mono);font-size:11px;opacity:.9}
  .icon-btn{width:33px;height:33px;display:grid;place-items:center;border-radius:9px;cursor:pointer;
    background:#F2F5F9;border:1px solid #E1E6EE;color:#3A465A;font-size:15px}
  .icon-btn:hover{background:#E6EBF2;color:#151C28}
  .menu-wrap{position:relative}
  .dropdown{position:absolute;right:0;top:calc(100% + 8px);background:var(--surface);border:1px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;min-width:190px;z-index:60;display:none}
  .dropdown.open{display:block}
  .dropdown .dh{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:7px 10px 5px;font-weight:600;font-family:var(--mono)}
  .dropdown button{display:flex;width:100%;align-items:center;gap:8px;background:none;border:0;text-align:left;
    padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--ink-2);font-size:13px}
  .dropdown button:hover{background:var(--surface-2)}
  .dropdown button.sel{color:var(--accent);font-weight:650}
  .dropdown button .rk{margin-left:auto;font-size:10px;color:var(--faint);font-family:var(--mono)}
  .dropdown button.sel .rk{color:var(--accent)}

  /* calendar */
  .calbar{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:56px;z-index:30}
  .calbar-in{max-width:1480px;margin:0 auto;padding:8px clamp(12px,2vw,24px);display:flex;align-items:center;gap:12px}
  .cal-label{display:flex;align-items:center;gap:7px;flex:none;font-size:11.5px;font-weight:650;color:var(--ink-2)}
  .cal-label .cal-ic{width:21px;height:21px;border-radius:6px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:11px}
  .cal-label span{font-family:var(--mono);font-size:10px;color:var(--faint);font-weight:500}
  .cal-track{display:flex;gap:7px;overflow-x:auto;scrollbar-width:thin}
  .cal-track::-webkit-scrollbar{height:4px}.cal-track::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
  .cal-item{flex:none;display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:9px;padding:5px 10px;font-size:12px;white-space:nowrap}
  .cal-item time{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:650}
  .cal-item.now{border-color:var(--accent);background:var(--accent-soft)}
  .cal-item .tag{font-size:9.5px;color:var(--faint);border-left:1px solid var(--line-2);padding-left:7px}

  .shell{max-width:1480px;margin:0 auto;display:flex;align-items:flex-start;gap:clamp(14px,1.5vw,22px);padding:0 clamp(12px,2vw,24px)}
  main{flex:1;min-width:0;padding:clamp(14px,2vw,24px) 0}
  /* right agent rail (ver2.0) */
  .agent-rail{width:378px;flex:none;position:sticky;top:68px;align-self:flex-start;height:calc(100vh - 84px);display:flex;flex-direction:column;padding:clamp(14px,2vw,24px) 0;transition:width .18s}
  .agent-rail.wide{width:min(560px,46vw)}
  .ag-bar{flex:none;display:flex;align-items:center;gap:6px;padding:0 2px 11px}
  .ag-bar-t{font-size:12px;font-weight:750;color:var(--ink-2);display:flex;align-items:center;gap:6px}
  .ag-bar-t::before{content:"";font-size:0}
  .ag-bar .sp{flex:1}
  .ag-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;cursor:pointer;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);font-size:15px;line-height:1}
  .ag-ic:hover{background:var(--surface-3);color:var(--ink)}
  .ag-fab{position:fixed;right:22px;bottom:22px;z-index:70;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:0;box-shadow:var(--shadow-lg);cursor:pointer;font-size:16px;font-weight:800;display:none;align-items:center;justify-content:center}
  .ag-fab:hover{filter:brightness(1.07)}
  body.ag-closed .agent-rail{display:none}
  body.ag-closed .ag-fab{display:flex}
  .ag-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-right:3px;scrollbar-width:thin}
  .ag-scroll::-webkit-scrollbar{width:5px}.ag-scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
  .ag-greet{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
  .ag-greet b{font-size:15.5px;font-weight:800;display:block;letter-spacing:-.01em}
  .ag-greet span{font-size:11px;opacity:.92;font-family:var(--mono);display:block;margin-top:4px}
  .ag-card{background:var(--surface);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-sm);padding:12px 14px}
  .ag-card h5{margin:0 0 9px;font-size:12px;font-weight:750;color:var(--ink);display:flex;align-items:center;gap:6px}
  .ag-card h5 .lk{margin-left:auto;font-size:10.5px;color:var(--accent);font-weight:700;cursor:pointer}
  .ag-card h5 .lk:hover{text-decoration:underline}
  .ag-kpi{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;border-bottom:1px solid var(--line-2)}
  .ag-kpi:last-child{border-bottom:0}
  .ag-kpi i{width:8px;height:8px;border-radius:50%;flex:none}
  .ag-kpi .kl{color:var(--ink-2);font-weight:600}
  .ag-kpi .kv{margin-left:auto;font-family:var(--mono);font-weight:800;font-size:12.5px}
  .ag-ins{font-size:12px;line-height:1.6;color:var(--ink-2)}
  .ag-ins b{color:var(--ink);font-weight:700;background:linear-gradient(transparent 60%,rgba(0,155,100,.18) 60%)}
  .ag-ins .row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--line-2)}
  .ag-ins .row:last-child{border-bottom:0}
  .ag-ins .tg{font-size:9px;font-weight:800;font-family:var(--mono);padding:2px 6px;border-radius:5px;flex:none}
  .ag-chat-h{display:flex;align-items:center;gap:9px;padding:6px 2px 0;border-top:1px dashed var(--line-2);margin-top:2px;padding-top:12px}
  .ag-chat-h .ag-av{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#12B37A,#00875A);display:grid;place-items:center;color:#fff;font-size:12px;flex:none;font-weight:700}
  .ag-chat-h b{font-size:13px;font-weight:750;display:block;line-height:1.2}
  .ag-chat-h span{font-size:10px;color:var(--accent);font-family:var(--mono);display:block;font-weight:600}
  .ag-stream{display:flex;flex-direction:column;gap:10px;padding:2px 0 4px}
  .ag-foot{flex:none;display:flex;gap:7px;padding-top:11px}
  .ag-foot input{flex:1;background:var(--surface);border:1px solid var(--line-2);border-radius:11px;padding:11px 13px;font-size:12.5px;color:var(--ink);outline:none;box-shadow:var(--shadow-sm)}
  .ag-foot input:focus{border-color:var(--accent)}
  .ag-foot button{background:var(--accent);color:#fff;border:0;border-radius:11px;width:42px;height:42px;cursor:pointer;font-size:15px;flex:none}
  .ag-foot button:hover{filter:brightness(1.06)}
  /* mobile: chat agent takes the whole screen; dashboard hidden unless agent closed */
  @media(max-width:880px){
    /* 헤더 항상 고정 + 로고 중앙 */
    .topbar{position:fixed;left:0;right:0;top:0;z-index:60}
    body{padding-top:56px}
    .topbar-in{justify-content:center;gap:0}
    nav.mainnav{display:none}
    .brand{position:static}
    .brand .blogo{align-items:center}
    .brand .tagline{display:none}
    .top-right{position:absolute;right:clamp(10px,3vw,16px);top:50%;transform:translateY(-50%);gap:6px}
    .pill-btn.date{display:none}
    /* 에이전트 전체화면 + 입력창 하단 고정 */
    .shell{flex-direction:column}
    .agent-rail{position:fixed;inset:56px 0 0 0;width:auto!important;height:auto;padding:12px 14px 0;background:var(--plane);z-index:45}
    .ag-foot{padding-bottom:calc(11px + env(safe-area-inset-bottom))}
    body:not(.ag-closed) main{display:none}
    body.ag-closed .agent-rail{display:none}
    body.ag-closed main{display:block}
    .ag-fab{right:16px;bottom:calc(16px + env(safe-area-inset-bottom))}
  }
  .sched{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-sm);padding:15px 15px 13px}
  .sched-h{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .sched-h .cal-ic{width:24px;height:24px;border-radius:7px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:12px;flex:none}
  .sched-h b{font-size:13px;font-weight:750}
  .sched-sub{font-size:10px;color:var(--faint);font-family:var(--mono);margin:0 0 10px 32px;display:flex;align-items:center;gap:6px}
  .sched-sub .today{background:var(--accent-soft);color:var(--accent);border-radius:5px;padding:1px 6px;font-weight:700}
  .sched-list{position:relative;padding-left:2px}
  .sched-list::before{content:"";position:absolute;left:7px;top:14px;bottom:14px;width:2px;background:var(--line)}
  .sched-item{display:grid;grid-template-columns:16px 1fr;gap:10px;padding:8px 0;position:relative}
  .sdot{width:12px;height:12px;border-radius:50%;border:2px solid var(--line-2);background:var(--surface);margin-top:3px;z-index:1}
  .sched-item.now .sdot{border-color:var(--accent);background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .sched-item.now .stitle{color:var(--accent)}
  .stime{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:700;line-height:1.2}
  .sched-item:not(.now) .stime{color:var(--muted)}
  .stitle{font-size:12.5px;font-weight:650;line-height:1.3;margin-top:1px;color:var(--ink)}
  .stag{font-size:10px;color:var(--faint);margin-top:2px}
  .sched-foot{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:10.5px;color:var(--faint);display:flex;align-items:center;gap:6px}
  /* breadcrumb */
  .crumbs{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-bottom:12px}
  .crumbs a{color:var(--accent);font-weight:600}
  .crumbs a:hover{text-decoration:underline}
  .crumbs .sep{color:var(--faint);font-family:var(--mono)}
  .crumbs .cur{color:var(--ink);font-weight:700}
  .crumbs .lvl{font-family:var(--mono);font-size:10px;background:var(--surface-3);color:var(--muted);padding:1px 6px;border-radius:5px;margin-right:4px}

  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .page-head h1{margin:0;font-size:clamp(18px,2.2vw,23px);font-weight:800;letter-spacing:-.02em}
  .page-head .desc{margin:4px 0 0;color:var(--muted);font-size:13px}
  .legend-note{display:flex;gap:12px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--muted)}
  .sig{display:inline-flex;align-items:center;gap:4px}.sig i{width:8px;height:8px;border-radius:50%}.sig b{color:var(--ink-2);font-weight:600}
  /* KPI 6대 영역 컨트롤타워 (PPTX 슬라이드 15~17) */
  .area{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:13px;overflow:hidden}
  .area-h{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--line);position:relative}
  .area-h::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--ac)}
  .area-no{font-family:var(--mono);font-size:10px;font-weight:800;color:#fff;background:var(--ac);padding:3px 8px;border-radius:6px;letter-spacing:.04em;white-space:nowrap}
  .area-h h3{margin:0;font-size:15px;font-weight:800;letter-spacing:-.01em}
  .area-lk{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:650;cursor:pointer;white-space:nowrap}
  .area-lk:hover{color:var(--ac)}
  .itile-grid{display:grid;gap:11px;grid-template-columns:repeat(4,1fr);padding:14px 16px}
  @media(max-width:1200px){.itile-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.itile-grid{grid-template-columns:1fr}}
  .itile{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 13px 11px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .itile:hover{background:var(--surface);box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--line-2)}
  .itile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--stripe,var(--line-2))}
  .itile.s-good{--stripe:var(--good)}.itile.s-warn{--stripe:var(--warn)}.itile.s-serious{--stripe:var(--serious)}.itile.s-crit{--stripe:var(--crit)}
  .itile-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;min-height:28px}
  .itile-l{font-size:11.5px;color:var(--ink-2);font-weight:700;line-height:1.3}
  .itile-v{font-size:23px;font-weight:800;letter-spacing:-.03em;margin:7px 0 0;line-height:1}
  .itile-v small{font-size:12px;font-weight:700;color:var(--ink-2);margin-left:1px}
  .itile-note{font-size:10px;color:var(--faint);margin-top:4px;line-height:1.35;min-height:25px}
  .itile-trend{margin-top:3px}
  .itile-trend .spark{margin-top:2px;height:26px}
  .itile-pct{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:9px;color:var(--faint);font-family:var(--mono)}
  .itile-pct .pm{white-space:nowrap}
  .itile-pct .pbar{position:relative;flex:1;height:6px;border-radius:4px;background:linear-gradient(90deg,var(--crit-tint),var(--warn-tint),var(--good-tint))}
  .itile-pct .pmark{position:absolute;top:-2px;bottom:-2px;width:3px;background:var(--ink);border-radius:2px;transform:translateX(-50%)}
  .itile-pct .pv{font-weight:700;color:var(--ink-2);white-space:nowrap}
  .itile-pct.muted{color:var(--faint);font-style:italic}
  .viz-legend{display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--muted);margin:0 2px 12px;padding:9px 13px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px}
  .viz-legend b{color:var(--ink-2);font-weight:700}
  .viz-legend .vl{display:inline-flex;align-items:center;gap:6px}
  .grid-4{display:grid;gap:12px;grid-template-columns:repeat(4,1fr)}
  @media(max-width:980px){.grid-4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.grid-4{grid-template-columns:1fr}}
  .idea-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:14px;cursor:pointer;transition:.16s}
  .idea-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--line-2)}
  .idea-card .ino{font-family:var(--mono);font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.06em}
  .idea-card h4{margin:5px 0 6px;font-size:14px;font-weight:800}
  .idea-card p{margin:0;font-size:11.5px;color:var(--ink-2);line-height:1.55}
  .idea-card .go{margin-top:9px;font-size:11px;color:var(--accent);font-weight:700}

  .section-label{display:flex;align-items:center;gap:11px;margin:30px 2px 15px;font-size:21px;font-weight:800;letter-spacing:-.02em;color:var(--ink);text-transform:none;line-height:1.2}
  .section-label::after{content:"";flex:1;height:2px;background:var(--line);border-radius:2px}
  .section-label .ln{font-family:var(--mono);color:#fff;background:var(--accent);font-size:13px;font-weight:800;padding:4px 10px;border-radius:8px;flex:none;box-shadow:var(--shadow-sm)}
  @media(max-width:640px){.section-label{font-size:17px}}

  .kpi-grid{display:grid;gap:11px;grid-template-columns:repeat(6,1fr)}
  @media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
  .kpi{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:13px 13px 12px;box-shadow:var(--shadow-sm);overflow:hidden;transition:.18s;cursor:pointer}
  .kpi:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--line-2)}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--stripe,var(--line-2))}
  .kpi.s-good{--stripe:var(--good)}.kpi.s-warn{--stripe:var(--warn)}.kpi.s-serious{--stripe:var(--serious)}.kpi.s-crit{--stripe:var(--crit)}
  .kpi-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
  .kpi-label{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.3}
  .status-pill{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;font-family:var(--mono)}
  .status-pill i{width:6px;height:6px;border-radius:50%}
  .p-good{background:var(--good-tint);color:var(--good-ink)}.p-good i{background:var(--good)}
  .p-warn{background:var(--warn-tint);color:var(--warn-ink)}.p-warn i{background:var(--warn)}
  .p-serious{background:var(--serious-tint);color:var(--serious-ink)}.p-serious i{background:var(--serious)}
  .p-crit{background:var(--crit-tint);color:var(--crit-ink)}.p-crit i{background:var(--crit)}
  .kpi-val{font-size:27px;font-weight:800;letter-spacing:-.03em;margin:8px 0 0;line-height:1}
  .kpi-val small{font-size:14px;font-weight:700;color:var(--ink-2);margin-left:1px}
  .kpi-sub{display:flex;align-items:center;gap:7px;margin-top:6px;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .kpi-sub .tgt{font-family:var(--mono)}
  .delta{display:inline-flex;align-items:center;gap:2px;font-weight:700;font-family:var(--mono)}
  .delta.up{color:var(--delta-up)}.delta.down{color:var(--delta-down)}
  .spark{margin-top:8px;width:100%;height:30px;display:block}
  .kpi-ask{position:absolute;right:8px;bottom:8px;opacity:0;transform:translateY(3px);transition:.16s;
    display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:650;color:var(--accent);
    background:var(--accent-soft);border:1px solid transparent;border-radius:7px;padding:3px 6px;cursor:pointer}
  .kpi:hover .kpi-ask{opacity:1;transform:translateY(0)}.kpi-ask:hover{border-color:var(--accent)}

  .grid-2{display:grid;gap:12px;grid-template-columns:1.85fr 1fr;align-items:stretch}
  @media(max-width:980px){.grid-2{grid-template-columns:1fr}}
  .grid-3{display:grid;gap:12px;grid-template-columns:1fr 1fr 1fr}
  @media(max-width:980px){.grid-3{grid-template-columns:1fr}}
  .grid-2e{display:grid;gap:12px;grid-template-columns:1fr 1fr}
  @media(max-width:760px){.grid-2e{grid-template-columns:1fr}}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;min-width:0}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px 9px}
  .panel-head h3{margin:0;font-size:13.5px;font-weight:750}
  .panel-head .sub{font-size:11px;color:var(--faint);margin-top:2px}
  .chart-legend{display:flex;gap:11px;font-size:11px;color:var(--ink-2);font-weight:600;flex-wrap:wrap}
  .chart-legend .k{display:inline-flex;align-items:center;gap:5px}.chart-legend .k i{width:11px;height:3px;border-radius:2px}
  .chart-box{padding:2px 12px 12px;position:relative}
  .chart-box svg{display:block;width:100%;height:auto;overflow:visible}
  .tt{position:absolute;pointer-events:none;background:var(--nav);color:#fff;border-radius:9px;padding:8px 10px;font-size:11px;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .1s;z-index:20;min-width:118px}
  .tt .tt-h{font-family:var(--mono);font-size:10px;opacity:.7;margin-bottom:4px}
  .tt .tt-r{display:flex;align-items:center;gap:6px;justify-content:space-between}
  .tt .tt-r .l{display:inline-flex;align-items:center;gap:5px}.tt .tt-r i{width:8px;height:8px;border-radius:2px}.tt .tt-r b{font-family:var(--mono);font-weight:700}

  /* judge/alert */
  .judge{padding:13px 15px 15px;display:flex;flex-direction:column;gap:13px}
  .jblock h4{margin:0 0 8px;font-size:12px;font-weight:750;display:flex;align-items:center;gap:7px}
  .jblock h4 .cnt{font-family:var(--mono);font-size:10.5px;background:var(--crit-tint);color:var(--crit-ink);padding:1px 6px;border-radius:5px;font-weight:700}
  .alert{display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);cursor:pointer;transition:.15s;margin-bottom:6px}
  .alert:hover{border-color:var(--accent-2);background:var(--accent-soft)}.alert:last-child{margin-bottom:0}
  .alert .urg{flex:none;font-size:9px;font-weight:800;font-family:var(--mono);padding:2px 5px;border-radius:5px;margin-top:1px;white-space:nowrap}
  .u-crit{background:var(--crit);color:#fff}.u-serious{background:var(--serious);color:#3a1a0e}.u-warn{background:var(--warn);color:#4a3608}
  .alert .atxt{font-size:11.5px;color:var(--ink-2);line-height:1.4}.alert .atxt b{color:var(--ink);font-weight:700}
  .alert .atxt .loc{display:inline-block;margin-top:3px;font-size:10px;color:var(--accent);font-weight:600}
  .alert .go{margin-left:auto;color:var(--faint);font-size:14px;flex:none;align-self:center;transition:.15s}
  .alert:hover .go{color:var(--accent);transform:translateX(2px)}
  .brief{background:linear-gradient(180deg,var(--accent-soft),transparent);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
  .brief h4{margin:0 0 6px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-family:var(--mono);font-weight:700}
  .brief p{margin:0;font-size:12px;line-height:1.55;color:var(--ink-2)}
  .brief p b{color:var(--ink);font-weight:700;background:linear-gradient(transparent 62%,rgba(250,178,25,.42) 62%)}
  .drill{border-top:1px dashed var(--line-2);padding-top:11px}
  .drill h4{margin:0 0 8px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);font-weight:700}
  .drill-flow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:11px}
  .drill-flow .n{background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:4px 8px;font-weight:600;color:var(--ink-2);cursor:pointer}
  .drill-flow .n:hover{border-color:var(--accent);color:var(--accent)}
  .drill-flow .n.hd{background:var(--accent);color:#fff;border-color:var(--accent)}
  .drill-flow .ar{color:var(--faint);font-family:var(--mono)}

  /* tables */
  .tbl-wrap{overflow-x:auto;padding:0 4px 8px}
  table.dt{border-collapse:collapse;width:100%;font-size:12.5px;min-width:480px}
  table.dt thead th{text-align:left;font-weight:700;color:var(--muted);padding:9px 12px;border-bottom:1.5px solid var(--line-2);font-size:11px;white-space:nowrap}
  table.dt thead th.r,table.dt td.r{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono)}
  table.dt tbody td{padding:9px 12px;border-bottom:1px solid var(--line);color:var(--ink-2)}
  table.dt tbody tr{cursor:pointer;transition:.12s}
  table.dt tbody tr:hover td{background:var(--surface-2)}
  table.dt tbody tr:last-child td{border-bottom:0}
  table.dt td .nm{display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ink)}
  table.dt td .nm i{width:8px;height:8px;border-radius:50%;flex:none}
  table.dt td .go{color:var(--faint);font-family:var(--mono)}
  .mini-pill{font-size:9.5px;font-weight:700;font-family:var(--mono);padding:1px 6px;border-radius:5px}

  /* bars */
  .bars{padding:6px 15px 15px}
  .bar-row{display:grid;grid-template-columns:88px 1fr 52px;align-items:center;gap:10px;padding:6px 0}
  .bar-row .bl{font-size:12px;color:var(--ink-2);font-weight:550}
  .bar-track{position:relative;height:9px;background:var(--surface-2);border-radius:6px}
  .bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:var(--accent);transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .bar-fill.ok{background:var(--good)}.bar-fill.mid{background:var(--warn)}.bar-fill.low{background:var(--serious)}.bar-fill.crit{background:var(--crit)}
  .bar-tgt{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);opacity:.5;border-radius:2px}
  .bar-val{font-size:12px;font-weight:750;text-align:right;font-variant-numeric:tabular-nums}
  .bars .foot{font-size:10px;color:var(--faint);margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}

  /* stat tiles small */
  .stat-row{display:grid;gap:11px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));padding:0}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow-sm)}
  .stat .sl{font-size:11px;color:var(--muted);font-weight:600}
  .stat .sv{font-size:22px;font-weight:800;margin-top:5px;letter-spacing:-.02em}
  .stat .sv small{font-size:12px;color:var(--ink-2);font-weight:700}
  .stat .sd{font-size:10.5px;color:var(--faint);margin-top:3px;font-family:var(--mono)}

  /* tree explorer */
  .tree{padding:8px 8px 12px}
  .tnode{border-radius:9px;transition:.12s}
  .tnode>.tlabel{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:9px;cursor:pointer;font-size:12.5px}
  .tnode>.tlabel:hover{background:var(--surface-2)}
  .tnode>.tlabel.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
  .tnode>.tlabel .tw{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .tnode>.tlabel .caret{width:14px;color:var(--faint);transition:.15s;font-size:10px}
  .tnode.open>.tlabel .caret{transform:rotate(90deg)}
  .tchildren{display:none;margin-left:14px;border-left:1px solid var(--line);padding-left:6px}
  .tnode.open>.tchildren{display:block}
  .tnode .tnode>.tlabel{font-size:12px;color:var(--ink-2)}

  /* okr */
  .okr-pillars{display:grid;gap:11px;grid-template-columns:repeat(3,1fr)}
  @media(max-width:760px){.okr-pillars{grid-template-columns:1fr}}
  .pillar{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow-sm)}
  .pillar h4{margin:0;font-size:13px;font-weight:750;display:flex;justify-content:space-between;align-items:center}
  .pillar .pct{font-family:var(--mono);font-size:20px;font-weight:800}
  .prog{height:7px;background:var(--surface-2);border-radius:5px;margin-top:9px;overflow:hidden}
  .prog i{display:block;height:100%;border-radius:5px}
  .kr{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px}
  .kr:last-child{border-bottom:0}
  .kr .tag{font-size:9px;font-weight:800;font-family:var(--mono);padding:2px 5px;border-radius:4px;flex:none}
  .kr .tag.lead{background:var(--accent-soft);color:var(--accent)}.kr .tag.lag{background:var(--surface-3);color:var(--muted)}
  .kr .kn{flex:1;color:var(--ink-2);font-weight:550}
  .kr .kv{font-family:var(--mono);font-weight:700}
  .kr .kp{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:5px;font-weight:700;flex:none}

  /* benchmark */
  .bm-row{display:grid;grid-template-columns:130px 1fr 60px;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
  .bm-row:last-child{border-bottom:0}
  .bm-row .bml{font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .bm-track{position:relative;height:22px;background:linear-gradient(90deg,var(--crit-tint),var(--warn-tint),var(--good-tint));border-radius:6px}
  .bm-mark{position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--ink);border-radius:2px}
  .bm-mark::after{content:attr(data-v);position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;font-family:var(--mono);color:var(--ink);white-space:nowrap;font-weight:700}
  .bm-avg{position:absolute;top:0;bottom:0;width:1px;background:var(--muted);opacity:.6}
  .bm-pct{font-family:var(--mono);font-size:13px;font-weight:800;text-align:right}

  /* cause */
  .cause-grid{display:grid;gap:11px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .cause{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.15s}
  .cause:hover{border-color:var(--accent-2);box-shadow:var(--shadow)}
  .cause .ch{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:700}
  .cause .contrib{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:5px}
  .cause .cv{font-size:19px;font-weight:800;margin:8px 0 2px;letter-spacing:-.02em}
  .cause .cvd{font-size:11px;color:var(--muted)}
  .cbar{height:6px;background:var(--surface-2);border-radius:4px;margin-top:9px;overflow:hidden}
  .cbar i{display:block;height:100%;border-radius:4px}

  /* lock / notice */
  .lock{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:40px 24px;text-align:center;box-shadow:var(--shadow-sm)}
  .lock .ic{font-size:34px}.lock h3{margin:12px 0 4px;font-size:16px}.lock p{margin:0;color:var(--muted);font-size:13px}
  .lock .who{margin-top:14px;font-size:12px;color:var(--ink-2)}
  .lock .who b{color:var(--accent)}

  /* report */
  .report{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:20px 22px}
  .report .rhd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px;flex-wrap:wrap}
  .report h2{margin:0;font-size:18px;font-weight:800}
  .report .rmeta{font-size:11px;color:var(--faint);font-family:var(--mono);margin-top:4px}
  .report h4{margin:18px 0 8px;font-size:13px;color:var(--accent);font-weight:750}
  .report p{margin:8px 0;font-size:13px;line-height:1.65;color:var(--ink-2)}
  .report ul{margin:8px 0;padding-left:18px;font-size:13px;color:var(--ink-2);line-height:1.7}
  .report .rbtns{display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:650;cursor:pointer}
  .btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)}
  .btn:hover{filter:brightness(1.06)}
  .tabbar{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
  .tabbar button{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
  .tabbar button.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* chatbot */
  .chat-scrim{position:fixed;inset:0;background:rgba(10,15,23,.4);backdrop-filter:blur(2px);z-index:80;display:none;align-items:flex-end;justify-content:flex-end;padding:20px}
  .chat-scrim.open{display:flex}
  .chatbox{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);width:min(390px,94vw);max-height:min(560px,86vh);display:flex;flex-direction:column;overflow:hidden}
  .chat-head{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line)}
  .chat-head .cav{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#12B37A,#00875A);display:grid;place-items:center;color:#fff;font-size:13px}
  .chat-head b{font-size:14px;font-weight:750}.chat-head span{font-size:10.5px;color:var(--faint);display:block;font-family:var(--mono)}
  .chat-head .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;width:30px;height:30px;display:grid;place-items:center;border-radius:8px}
  .chat-head .x:hover{background:var(--surface-2);color:var(--ink)}
  .chat-body{padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:11px}
  .msg{max-width:88%;font-size:12.5px;line-height:1.55;padding:9px 12px;border-radius:12px}
  .msg.q{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.a{align-self:flex-start;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);border-bottom-left-radius:4px}
  .msg.a b{color:var(--ink)}
  .msg.a .src{margin-top:7px;padding-top:7px;border-top:1px dashed var(--line-2);font-size:10px;color:var(--faint);font-family:var(--mono)}
  .msg.a .src.esc{color:var(--crit-ink);font-weight:700}
  .msg.a .cta{margin-top:8px}.msg.a .cta a{display:inline-block;background:var(--accent);color:#fff;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:650}
  .chat-foot{padding:11px 13px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}
  .chat-foot input{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:12.5px;color:var(--ink);outline:none}
  .chat-foot input:focus{border-color:var(--accent)}
  .chat-foot button{background:var(--accent);color:#fff;border:0;border-radius:10px;width:38px;height:38px;cursor:pointer;font-size:15px;flex:none}

  .footer{max-width:1480px;margin:0 auto;padding:10px clamp(12px,2vw,24px) 30px;color:var(--faint);font-size:11px;font-family:var(--mono);display:flex;gap:14px;flex-wrap:wrap;justify-content:space-between}
  .demo-tag{background:var(--warn-tint);color:var(--warn-ink);border-radius:6px;padding:2px 8px;font-weight:700}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  /* ===== ver2.0 new menus ===== */
  /* keyword workspace */
  .kw-wrap{display:grid;grid-template-columns:236px 1fr;gap:12px;align-items:start}
  @media(max-width:1100px){.kw-wrap{grid-template-columns:1fr}}
  .kw-list{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:7px;position:sticky;top:120px}
  @media(max-width:1100px){.kw-list{position:static}}
  .kw-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .kw-item:hover{background:var(--surface-2)}
  .kw-item.on{background:var(--accent-soft);color:var(--accent);font-weight:750}
  .kw-item .kc{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .kw-item.on .kc{color:var(--accent)}
  .art-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm);padding:13px 14px;margin-bottom:10px;transition:.15s}
  .art-card:hover{border-color:var(--line-2);box-shadow:var(--shadow)}
  .art-card .at{font-size:13.5px;font-weight:700;line-height:1.4;color:var(--ink)}
  .art-meta{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:10.5px;color:var(--faint);font-family:var(--mono)}
  .art-meta .mm{color:var(--accent);font-weight:700}
  .art-sum{font-size:12px;color:var(--ink-2);line-height:1.55;margin-top:8px}
  .art-acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .a-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:650;padding:5px 9px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2)}
  .a-chip:hover{border-color:var(--accent);color:var(--accent)}
  .a-chip.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
  .a-chip.pri:hover{color:#fff;filter:brightness(1.06)}
  /* side prompt panel */
  .kw-chat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;position:sticky;top:120px;max-height:calc(100vh - 150px)}
  @media(max-width:1100px){.kw-chat{position:static;max-height:none}}
  .kw-chat .kch{display:flex;align-items:center;gap:9px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .kw-chat .kch .cav{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#12B37A,#00875A);display:grid;place-items:center;color:#fff;font-size:12px;flex:none}
  .kw-chat .kch b{font-size:13px;font-weight:750}.kw-chat .kch span{font-size:10px;color:var(--faint);font-family:var(--mono)}
  .kw-body{padding:13px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;flex:1;min-height:150px}
  .kw-foot{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:7px}
  .kw-foot input{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12px;color:var(--ink);outline:none}
  .kw-foot input:focus{border-color:var(--accent)}
  .kw-foot button{background:var(--accent);color:#fff;border:0;border-radius:9px;width:36px;height:36px;cursor:pointer;font-size:14px;flex:none}
  .kw-empty{color:var(--faint);font-size:12px;text-align:center;padding:24px 8px;line-height:1.6}
  /* source pill + escalation (P-TU 계승) */
  .src-pill{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 8px;border-radius:7px;font-size:10px;font-weight:700;font-family:var(--mono);background:var(--accent-soft);color:var(--accent)}
  .src-pill.esc{background:var(--crit-tint);color:var(--crit-ink)}
  /* media sentiment */
  .sent{font-size:9.5px;font-weight:800;font-family:var(--mono);padding:2px 7px;border-radius:5px;white-space:nowrap}
  .sent.pos{background:var(--good-tint);color:var(--good-ink)}
  .sent.neu{background:var(--surface-3);color:var(--muted)}
  .sent.neg{background:var(--crit-tint);color:var(--crit-ink)}
  /* speech archive + diff review */
  .sp-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm);padding:14px 15px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .sp-card:hover{border-color:var(--line-2);box-shadow:var(--shadow)}
  .sp-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sp-top .spt{font-size:14px;font-weight:750;color:var(--ink)}
  .sp-tag{font-size:9.5px;font-weight:800;font-family:var(--mono);padding:2px 7px;border-radius:5px;background:var(--accent-soft);color:var(--accent)}
  .sp-date{font-size:10.5px;color:var(--faint);font-family:var(--mono)}
  .sp-shared{font-size:10px;color:var(--good-ink);font-weight:700}
  .sp-sum{font-size:12px;color:var(--ink-2);line-height:1.55;margin-top:7px}
  .gen-box{background:linear-gradient(180deg,var(--accent-soft),transparent);border:1px solid var(--accent-line,var(--line));border-radius:12px;padding:14px 15px;margin-bottom:14px}
  .gen-box h4{margin:0 0 4px;font-size:12px;font-weight:750;color:var(--accent);display:flex;align-items:center;gap:6px}
  .gen-box p{margin:0 0 10px;font-size:11.5px;color:var(--ink-2);line-height:1.5}
  .gen-src{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
  .gen-src .gs{font-size:10.5px;padding:4px 8px;border-radius:7px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--ink-2);font-weight:600}
  .gen-src .gs.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .review-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--warn-tint);border:1px solid var(--warn);border-radius:9px;padding:8px 11px;font-size:11.5px;color:var(--warn-ink);font-weight:650;margin-bottom:11px}
  .review-bar .rb-acts{margin-left:auto;display:flex;gap:6px}
  .draft-para{padding:11px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:9px;background:var(--surface);position:relative}
  .draft-para.pending{border-color:var(--warn);background:var(--warn-tint)}
  .draft-para.accepted{border-color:var(--good);background:var(--good-tint)}
  .draft-para .dp-txt{font-size:12.5px;line-height:1.7;color:var(--ink)}
  .draft-para .dp-txt ins{background:rgba(12,163,12,.18);text-decoration:none;border-radius:3px;padding:0 2px;color:var(--good-ink)}
  .draft-para .dp-txt del{background:rgba(208,59,59,.14);border-radius:3px;padding:0 2px;color:var(--crit-ink)}
  .dp-acts{display:flex;gap:6px;margin-top:9px}
  .dp-acts button{font-size:11px;font-weight:650;padding:4px 10px;border-radius:7px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2);cursor:pointer}
  .dp-acts .acc{border-color:var(--good);color:var(--good-ink)}.dp-acts .acc:hover{background:var(--good-tint)}
  .dp-acts .rej{border-color:var(--crit);color:var(--crit-ink)}.dp-acts .rej:hover{background:var(--crit-tint)}
</style>
</head>

/* ============================================================ HELPERS */
function round(v,d){var m=Math.pow(10,d||0);return Math.round(v*m)/m}
function wavg(depts,key){var s=0,w=0;depts.forEach(function(d){s+=d[key]*d.en;w+=d.en});return w?s/w:0}
/* ===== 고정 수치 (LOCKED — 평택대 실제값, 절대 수정 금지) =====
   재학생 충원율 85.3% · 신입생 충원율 100% · 취업률 55%

var FIXED_KPI={nf:100,rf:85.3,emp:55};
function fixKPIs(){
  var all=[];COLLEGES.forEach(function(c){all=all.concat(c.depts)});
  var s={nf:FIXED_KPI.nf/wavg(all,'nf'),rf:FIXED_KPI.rf/wavg(all,'rf'),emp:FIXED_KPI.emp/wavg(all,'emp')};
  all.forEach(function(d){d.nf=d.nf*s.nf;d.rf=d.rf*s.rf;d.emp=d.emp*s.emp;});
}
function sum(depts,key){return depts.reduce(function(a,d){return a+d[key]},0)}

  id:c.id,n:c.n,en:sum(d,'en'),nf:round(wavg(d,'nf')+f,1),rf:round(wavg(d,'rf')+f,1),
  dr:round(wavg(d,'dr')-f*0.2,1),gr:round(wavg(d,'gr')+f*0.5,1),emp:round(wavg(d,'emp')+f,1),
  bud:sum(d,'bud'),pap:sum(d,'pap'),res:sum(d,'res'),depts:d
}}
function univRoll(){var all=[];COLLEGES.forEach(function(c){all=all.concat(c.depts)});var f=termF();return{
  en:sum(all,'en'),nf:round(wavg(all,'nf')+f,1),rf:round(wavg(all,'rf')+f,1),

/* sparkline */
function spark(data,stroke){var W=118,H=30,p=3;var mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),rng=(mx-mn)||1;
  var pts=data.map(function(v,i){return [p+i/(data.length-1)*(W-2*p),p+(1-(v-mn)/rng)*(H-2*p)]});
  var d=pts.map(function(q,i){return (i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)}).join(' ');
  var area=d+' L'+pts[pts.length-1][0].toFixed(1)+' '+H+' L'+pts[0][0].toFixed(1)+' '+H+' Z';
  var last=pts[pts.length-1],id='sg'+Math.floor(Math.abs(pts[0][1]*97+data[0]*13));
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true"><defs><linearGradient id="'+id+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="'+stroke+'" stop-opacity="0.2"/><stop offset="1" stop-color="'+stroke+'" stop-opacity="0"/></linearGradient></defs><path d="'+area+'" fill="url(#'+id+')"/><path d="'+d+'" fill="none" stroke="'+stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="2.3" fill="'+stroke+'"/></svg>';
}
function sparkSyn(base,st){var f=termF();var arr=[];for(var i=0;i<9;i++){arr.push(base-(8-i)*0.6 + (i%2?0.3:-0.2) + f*0.3)}return spark(arr,colorOf(st))}

/* generic line chart with hover */
var chartSeq=0;
function lineChart(series,xLabels,yMin,yMax,opts){
  opts=opts||{};var id='lc'+(chartSeq++);
  var VB={w:760,h:opts.h||280,l:40,r:opts.r||64,t:14,b:28};
  function sx(i){return VB.l+i/(xLabels.length-1)*(VB.w-VB.l-VB.r)}
  function sy(v){return VB.t+(1-(v-yMin)/(yMax-yMin))*(VB.h-VB.t-VB.b)}
  function ln(data){return data.map(function(v,i){return (i?'L':'M')+sx(i).toFixed(1)+' '+sy(v).toFixed(1)}).join(' ')}
  var g='',step=(yMax-yMin)/4;
  for(var yv=yMin;yv<=yMax+0.01;yv+=step){var y=sy(yv);
    g+='<line x1="'+VB.l+'" x2="'+(VB.w-VB.r)+'" y1="'+y.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="var(--grid)" stroke-width="1"/>';
    g+='<text x="'+(VB.l-8)+'" y="'+(y+3.5).toFixed(1)+'" fill="var(--muted)" font-size="10" text-anchor="end" font-family="var(--mono)">'+round(yv,0)+'</text>';}
  for(var i=0;i<xLabels.length;i++){if(xLabels.length>8 && i%2)continue;g+='<text x="'+sx(i).toFixed(1)+'" y="'+(VB.h-9)+'" fill="var(--muted)" font-size="9.5" text-anchor="middle">'+xLabels[i]+'</text>';}
  if(series[0].area){var ap=ln(series[0].data)+' L'+sx(xLabels.length-1).toFixed(1)+' '+sy(yMin)+' L'+VB.l+' '+sy(yMin)+' Z';g+='<path d="'+ap+'" fill="'+series[0].color+'" fill-opacity="0.08"/>';}
  series.forEach(function(s){g+='<path d="'+ln(s.data)+'" fill="none" stroke="'+s.color+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>';
    var lx=sx(xLabels.length-1),ly=sy(s.data[s.data.length-1]);
    g+='<circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="3.4" fill="'+s.color+'" stroke="var(--surface)" stroke-width="2"/>';
    if(s.endLabel!==false)g+='<text x="'+(lx+7)+'" y="'+(ly+3.5).toFixed(1)+'" fill="'+s.color+'" font-size="10.5" font-weight="700" font-family="var(--mono)">'+s.data[s.data.length-1].toFixed(opts.dec!=null?opts.dec:1)+(opts.suf||'')+'</text>';});
  g+='<line class="xh" x1="0" x2="0" y1="'+VB.t+'" y2="'+(VB.h-VB.b)+'" stroke="var(--axis)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>';
  series.forEach(function(s,si){g+='<circle class="hp hp'+si+'" r="4" fill="'+s.color+'" stroke="var(--surface)" stroke-width="2" opacity="0"/>';});
  g+='<rect class="hit" x="'+VB.l+'" y="'+VB.t+'" width="'+(VB.w-VB.l-VB.r)+'" height="'+(VB.h-VB.t-VB.b)+'" fill="transparent"/>';
  var svg='<svg class="lc" viewBox="0 0 '+VB.w+' '+VB.h+'" data-id="'+id+'" role="img" aria-label="추이 그래프">'+g+'</svg>';
  /* stash config for hover */
  LC_STORE[id]={series:series,xLabels:xLabels,VB:VB,sx:sx,sy:sy,suf:opts.suf||'%',dec:opts.dec!=null?opts.dec:1};
  return svg;
}
var LC_STORE={};
function attachCharts(){
  $$('.lc').forEach(function(svg){
    var cfg=LC_STORE[svg.getAttribute('data-id')];if(!cfg||svg._wired)return;svg._wired=1;
    var tt=document.createElement('div');tt.className='tt';svg.parentNode.appendChild(tt);
    var VB=cfg.VB;
    svg.addEventListener('mousemove',function(e){
      var rect=svg.getBoundingClientRect(),scale=VB.w/rect.width;
      var px=(e.clientX-rect.left)*scale;
      var i=Math.round((px-VB.l)/((VB.w-VB.l-VB.r)/(cfg.xLabels.length-1)));
      i=Math.max(0,Math.min(cfg.xLabels.length-1,i));var x=cfg.sx(i);
      var xh=svg.querySelector('.xh');xh.setAttribute('x1',x);xh.setAttribute('x2',x);xh.setAttribute('opacity','1');
      var rows='',minY=1e9;
      cfg.series.forEach(function(s,si){var y=cfg.sy(s.data[i]);minY=Math.min(minY,y);
        var hp=svg.querySelector('.hp'+si);hp.setAttribute('cx',x);hp.setAttribute('cy',y);hp.setAttribute('opacity','1');
        rows+='<div class="tt-r"><span class="l"><i style="background:'+s.color+'"></i>'+s.name+'</span><b>'+s.data[i].toFixed(cfg.dec)+cfg.suf+'</b></div>';});
      tt.innerHTML='<div class="tt-h">'+cfg.xLabels[i]+'</div>'+rows;tt.style.opacity='1';
      var box=tt.getBoundingClientRect(),lx=x/scale,left=lx-box.width/2;
      left=Math.max(6,Math.min(rect.width-box.width-6,left));
      tt.style.left=left+'px';tt.style.top=(minY/scale-box.height-12)+'px';
    });
    svg.addEventListener('mouseleave',function(){tt.style.opacity='0';svg.querySelector('.xh').setAttribute('opacity','0');$$('.hp',svg).forEach(function(h){h.setAttribute('opacity','0')});});
  });
}

function parseHash(){
  var h=(location.hash||'#/home').replace(/^#\//,'');var parts=h.split('/');
  return {view:parts[0]||'home',params:parts.slice(1)};
}
function allowed(view){
  var a=ACCESS[state.role];if(a==='*')return true;
  /* drill views inherit students/home access */
  var base=({college:'students',dept:'students',cause:'students'})[view]||view;
  return a.indexOf(view)>=0||a.indexOf(base)>=0;
}
function render(){
  var route=parseHash();var v=route.view,p=route.params;var html;
  var topView=({college:'students',dept:'students',cause:'students',keywords:'news',media:'news'})[v]||v;
  if(['home','strategy','students','research','finance','compete','risks','reports','college','dept','cause','news','keywords','media','speeches'].indexOf(v)<0){html=vNotFound();}
  else if(!allowed(v)){html=vLocked(topView);}
  else{
    switch(v){
      case 'home':html=vHome();break;
      case 'students':html=vStudents();break;
      case 'strategy':html=vStrategy();break;
      case 'research':html=vResearch();break;
      case 'finance':html=vFinance();break;
      case 'compete':html=vCompete();break;
      case 'risks':html=vRisks();break;
      case 'keywords':state.newsTab='keywords';html=vNews();break;
      case 'media':state.newsTab='media';html=vNews();break;
      case 'news':html=vNews();break;
      case 'speeches':html=vSpeeches();break;
      case 'reports':html=vReports();break;
      case 'college':html=vCollege(p[0]);break;
      case 'dept':html=vDept(p[0],p[1]);break;
      case 'cause':html=vCause(p[0],p[1],p[2]);break;
      default:html=vNotFound();
    }
  }
  $('#app').innerHTML=html;
  window.scrollTo(0,0);
  buildNav(topView);
  attachCharts();
  if(v==='reports')fillReport();
  syncAgent(topView);
}

function agentFreeAsk(txt){
  var words=txt.split(/\s+/).filter(function(w){return w.length>1});
  var i,j;
  for(i=0;i<KEYWORDS.length;i++){for(j=0;j<KEYWORDS[i].arts.length;j++){var a=KEYWORDS[i].arts[j];
    if(words.some(function(w){return a.t.indexOf(w)>=0})){agentPush({q:txt,a:'<b>'+a.t+'</b><br>'+a.sum,src:a.src+' · '+a.date});return;}}}
  for(i=0;i<MEDIA.length;i++){var m=MEDIA[i];if(words.some(function(w){return m.t.indexOf(w)>=0})){agentPush({q:txt,a:'<b>'+m.t+'</b><br>'+m.sum,src:m.media+' · '+m.date+' 보도'});return;}}
  var map=[['재학','retfill'],['유지','retfill'],['신입','newfill'],['충원',/재학/.test(txt)?'retfill':'newfill'],['취업','emp'],['재정','exec'],['집행','exec'],['발전','plan'],['기관평가','accr'],['전임','accr']];
  for(i=0;i<map.length;i++){if(txt.indexOf(map[i][0])>=0){var c=CHAT[map[i][1]];if(c){agentPush({q:txt,a:c.a,src:c.src,cta:c.cta});return;}}}
  agentPush({q:txt,a:'공식 근거를 확인할 수 없어 지어내지 않겠습니다. 다른 표현으로 물어보시거나, 담당 부서(기획경영본부)로 확인을 연결해 드리겠습니다.',src:'확인 불가 → 기획경영본부 에스컬레이션',esc:true});
}
function openChatTopic(topic,custom){
  var c=custom||CHAT[topic];
  if(!c)c={q:'이 지표에 대해 알려줘',a:'공식 근거를 확인할 수 없어 지어내지 않겠습니다. 담당 부서(기획경영본부)로 연결해 드릴까요?',src:'확인 불가 → 기획경영본부 에스컬레이션',esc:true};
  agentPush({q:c.q,a:c.a,src:c.src,esc:c.esc,cta:c.cta});
}

/* ============================================================ EVENTS */
document.addEventListener('click',function(e){
  /* specific controls first — some live INSIDE a data-nav card (e.g. KPI "왜?") */
  var ask=e.target.closest('[data-ask]');
  if(ask){e.stopPropagation();openChatTopic(ask.getAttribute('data-ask'));return;}
  /* ---- ver2.0 new-menu controls ---- */
  var kw=e.target.closest('[data-kw]');
  if(kw){state.kwSel=kw.getAttribute('data-kw');render();return;}
  var ntab=e.target.closest('[data-ntab]');
  if(ntab){state.newsTab=ntab.getAttribute('data-ntab');render();return;}
  var kwask=e.target.closest('[data-kwask]');
  if(kwask){e.stopPropagation();var pr=kwask.getAttribute('data-kwask').split('|');kwAskArticle(pr[0],+pr[1]);return;}
  var mask=e.target.closest('[data-mask]');
  if(mask){e.stopPropagation();mediaAsk(+mask.getAttribute('data-mask'));return;}
  var gsrc=e.target.closest('[data-gensrc]');
  if(gsrc){var gid=gsrc.getAttribute('data-gensrc');if(!state.genSrc)state.genSrc=[];var gi=state.genSrc.indexOf(gid);if(gi>=0)state.genSrc.splice(gi,1);else state.genSrc.push(gid);render();return;}
  if(e.target.closest('[data-genspeech]')){if(!state.genSrc||!state.genSrc.length){alert('근거로 삼을 연설문을 1편 이상 선택하세요.');return;}state.speechDraft=buildSpeechDraft();render();return;}
  var para=e.target.closest('[data-para]');
  if(para){var pi=+para.getAttribute('data-para'),pa=para.getAttribute('data-pact');if(state.speechDraft){state.speechDraft[pi].status=pa==='acc'?'accepted':'rejected';render();}return;}
  var paraall=e.target.closest('[data-paraall]');
  if(paraall){var pv=paraall.getAttribute('data-paraall')==='acc'?'accepted':'rejected';if(state.speechDraft)state.speechDraft.forEach(function(p){p.status=pv});render();return;}
  if(e.target.closest('[data-savespeech]')){
    var pending=state.speechDraft&&state.speechDraft.filter(function(p){return p.status==='pending'}).length;
    if(pending){alert('미검토 문단 '+pending+'건이 남아 저장할 수 없습니다. 문단별로 수락/되돌리기 하세요.');return;}
    var kept=state.speechDraft.filter(function(p){return p.status==='accepted'});
    SPEECHES.unshift({id:'sp'+(SPEECHES.length+1),t:'후기 대학원 졸업식 축사 (AI 초안 확정)',date:state.term.replace('-','.0')+'.현재',tag:'졸업식',shared:false,
      sum:'축적 아카이브(취임사·교직원회의)를 근거로 총장이 확정한 초안. 확정 문단 '+kept.length+'개.',
      body:kept.map(function(p){return p.html.replace(/<\/?ins>/g,'')}).join(' ')});
    state.speechDraft=null;render();alert('아카이브에 저장되었습니다. (데모)');return;}
  if(e.target.closest('[data-cancelspeech]')){state.speechDraft=null;render();return;}
  var speech=e.target.closest('[data-speech]');
  if(speech){var sp=SPEECHES.filter(function(x){return x.id===speech.getAttribute('data-speech')})[0];if(sp)openChatTopic(null,{q:'“'+sp.t+'” 전문 보기',a:'<b>'+sp.t+'</b> ('+sp.tag+' · '+sp.date+')<br><br>'+sp.body,src:'연설문 아카이브'});return;}
  if(e.target.closest('#agSend')){var av=$('#agInput');if(av&&av.value.trim()){agentFreeAsk(av.value.trim());av.value='';}return;}
  var nav=e.target.closest('[data-nav]');
  if(nav){
    location.hash=nav.getAttribute('data-nav');e.preventDefault();return;
  }
  var stab=e.target.closest('[data-stab]');
  if(stab){state.stab=stab.getAttribute('data-stab');render();return;}
  var rkind=e.target.closest('[data-rkind]');
  if(rkind){state.rkind=rkind.getAttribute('data-rkind');render();return;}
  var role=e.target.closest('[data-role]');
  if(role){state.role=role.getAttribute('data-role');$('#roleName').textContent=state.role;buildMenus();$('#roleMenu').classList.remove('open');render();return;}
  var term=e.target.closest('[data-term]');
  if(term){state.term=term.getAttribute('data-term');var t=TERMS.filter(function(x){return x.id===state.term})[0];$('#termBtn').innerHTML=t.label.replace(' · ',' · ')+' ▾';buildMenus();$('#termMenu').classList.remove('open');render();return;}
  if(e.target.closest('#genReport')){fillReport();return;}
  /* dropdowns */
  if(e.target.closest('#roleBtn')){e.stopPropagation();$('#roleMenu').classList.toggle('open');$('#termMenu').classList.remove('open');return;}
  if(e.target.closest('#termBtn')){e.stopPropagation();$('#termMenu').classList.toggle('open');$('#roleMenu').classList.remove('open');return;}
  if(e.target.closest('#themeBtn')){var cur=document.documentElement.getAttribute('data-theme');var next=cur==='dark'?'light':cur==='light'?'dark':(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',next);return;}
  /* agent panel open/close/expand (Gemini-style) */
  if(e.target.closest('#agClose')){document.body.classList.add('ag-closed');return;}
  if(e.target.closest('#agFab')){document.body.classList.remove('ag-closed');var sc=$('#agScroll');if(sc)sc.scrollTop=0;return;}
  if(e.target.closest('#agExpand')){$('#agentRail').classList.toggle('wide');return;}
  /* close dropdowns */
  $('#roleMenu').classList.remove('open');$('#termMenu').classList.remove('open');
});
$('#agSend').addEventListener('click',function(){var av=$('#agInput');if(av&&av.value.trim()){agentFreeAsk(av.value.trim());av.value='';}});
$('#agInput').addEventListener('keydown',function(e){if(e.key==='Enter'){var v=e.target.value.trim();if(v){agentFreeAsk(v);e.target.value='';}}});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){$('#roleMenu').classList.remove('open');$('#termMenu').classList.remove('open');}});
window.addEventListener('hashchange',render);

/* init */
fixKPIs();
buildMenus();
if(!location.hash)location.hash='#/home';
render();
})();
</script>
</body>
